body:
  text: 御製書春秋元年春王正月考春秋聖人尊王之經也元年春王正月開宗明義之第一也解此者自三傳以至後儒其說充棟或致操戈無容置議然識聖人之深意者有幾乎王道熄而作春秋春秋魯之舊史也自隱公始則不得不書隱公元年而即繼之曰春王正月前史所無有也蓋言公之元年乃稟王之春王之正而得是非尊王之義乎且是年也於齊為九年於晉為二年衛鄭以下各為其年不可僂指數而總為平王之四十九年於斯時也世人將何以紀其年而知其嵗乎是則聖人之書元年春王正月也者其亦有感於斯乎行夏之時聖人之私議不能行於時言春王而不言王春月可改而春不可改亦隱寓夏之時與王之元所謂大一統足以一天下之心而不可任其紛有不能行之嘆矣兹為開宗始義乃貫春秋之本未而絶筆於獲麟蓋聖人之道在萬世即聖人之憂在萬世是則封建之說不惟不可行於後世知聖人亦未必以為宜然也欽定四庫全書經部五春王正月考春秋類提要臣等謹按春王正月考二卷明張以寧撰以寧字志道古田人元泰定丁卯進士官至翰林侍講學士入明仍故官洪武二年奉使冊封安南王還卒于道事迹具明史文苑傳史稱以寧以春秋致髙第故所學尤専春秋多所自得撰胡傳辨疑最辨博惟春王正月考未就寓安南踰半嵗始卒業今胡傳辨疑已佚惟此書存考三王疊更時月並改經書正月繫之于王則為周正不待辨正月正嵗二名載于周禮兩正並用皆王制也左氏發傳特曰王周正月則正月建子亦無疑自漢以來亦無異議至唐劉知幾史通始以春秋為夏正世無信其說者自程子泥于行夏之時一言盛名之下羽翼者衆胡安國遂實以夏時冠周月之說程端學作春秋或問更堅持門户以梅賾僞書為據而支離蔓引以證之愈辨而愈滋顛倒夫左氏失之誣其間偶爾失真或亦間有至於本朝正朔則婦人孺子皆知之不應左氏誤記即如程子之說以左氏為秦人亦不應距周末僅數十年即不知前代正朔也異說紛紛殆不可解以寧獨徴引五經參以史漢著為一書决數百載之疑案可謂卓識至于當時帝王之後許用先代正朔故宋用商正見于長葛之傳諸侯之國亦或用夏正故傳載晉事與經皆有兩月之差古書所記時有參互後儒執為論端者蓋由于此以寧尚未及抉其本原又伊訓秦誓諸篇皆出古文本不足據以寧尚未及明其僞託而周禮正嵗正月之兼用僅載鄭注數語亦未分析暢言之以祛疑似于辨證尚為未密然大綱既得則細目之少疏亦不足以病焉乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋春王正月考序道學至宋氏而上接孔孟之傳何傳爾其世異其理同也儒先依經而言理有功於經甚大也而獨於春秋之書春王正月未能無疑之也何疑爾曰夏正得天百王所同也是以有冬不可為春之疑也曰夫子嘗以行夏之時告顏子也是以有夏時冠周月之疑也曰自漢武帝之用夏時首寅月逮于今莫之能改也是以傳書者有改正朔不改月數之疑而又有春秋用夏之時夏之月之疑也疑愈甚則說愈多而莫之能一也以寧蚤學是經以叨一第亦嘗有疑於此而未能決也間讀魯論夫子之言行夏之時若恍然而有省也因之歷稽經史傳記及古注疏之說同也乃知春王正月之春為周之時由漢逮唐諸儒舉無異說也而劉向周春夏冬之說陳寵天以為正周以為春之說最其著明者也而猶未敢自信也比觀子朱子語録晚年之三說亦同也其門人張氏集傳之說又同也於是渙然冰釋而無疑也竊嘗欲筆於書而奪於世故未遑也茲因忝使安南假館俟命之暇始克㑹萃而成編也本之於孔孟朱子徴之於經史而下而漢儒之說為多以其去古未逺有据而足徴朱子之著書多因其說也若易詩書之用夏建寅之月以為說則朱子於孟子之集注既主改月之說而於此未及更定之也今亦竊取朱子之義求朱子未盡之意以成朱子未竟之說次于春秋經傳之後以尊經也仍辨羣疑悉具于右非以寧之敢為私言也尚其與我同志之君子恕其狂僭之罪而是正之也洪武三年春三月三日晉安後學張以寧序
