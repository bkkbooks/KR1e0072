body:
  text: 春秋春王正月考明張以寧撰論語子曰行夏之時子朱子集注曰三代迭用三正天開於子周以子為天正地闢於丑商以丑為地正人生於寅夏以寅為人正而時以作事則嵗月當以人為紀故孔子嘗曰吾得夏時焉說者以為夏小正之屬蓋取其時之正與其令之善而於此又以告顏子也愚按字義春夏秋冬謂之四時月行每遲於日積三十日而與日㑹謂之一月二者固不同也夫子明言行夏之時有夏之時則有商周之時可知夏以建寅之月為春為正則商周以建丑建子之月為春為正可知不言月者月繫於時舉時以該月也聖人之言簡而奧辭不迫切而意已獨至者如此子朱子謂嵗月當以人事為紀又謂取其時之正曰月曰時已具此意至漢劉向曰周春夏冬也說具引春秋傳陳寵曰天以子為正周以為春全文見引後漢書陳寵傳則甚明白矣孟子梁惠王上七八月之閒旱子朱子集注曰周七八月夏五六月也離婁下歲十一月徒杠成十二月輿梁成子朱子集注曰周十一月夏九月也周十二月夏十月也夏令曰十月成梁從趙岐注前亦同愚按子朱子之說至矣孟子於戰國之世猶用周正朔也子朱子語録曰據周禮有正歲正月則周實是元改作春正月夫子所謂行夏之時只是為他不順故欲改從建寅又曰夫子周之臣子决不改周正朔又答吳晦叔書曰春秋是魯史合用時王之月愚按前語明春王正月之春為周之春也後語明春王正月之正為周之月也皆朱子晚年之定論也朱子說見語録俞氏臯集傳李氏亷㑹通李氏玨夏時序引之張氏集傳曰此所謂春乃建子月冬至陽氣萌生在三統為天統蓋天統以氣為主故月之建子即以為春而丑寅之氣皆天之所以生劉歆曰三統者天施地化人事之紀天施周正也地化商正也人事之紀夏正也愚按張氏名洽字主一臨江人子朱子之門人髙弟弟子也曰月之建子即以為春於朱子周元改作春正月之說必有所授之也總論曰自古帝王之興受命改正正朔各異時亦不同夫子於魯論言夏時通乎夏時之說則後之冬不可以為春之疑可釋矣故首之以夫子之言孟子於七篇言周月依乎周月之說則後之改正朔不改月數之疑亦可釋矣故次之以孟子之言朱子孔孟正學也張氏朱子門人也故又次之以朱子而以張氏附焉大聖大賢之說定則春秋之開卷第一義明矣春秋之三傳三傳之注疏皆同故以春秋經傳注疏及漢儒之引春秋為說者又次之傳記子史亦同而劉向陳寵之說甚瑩足以發明春秋之㫖故引所載子思之言及禮記漢史記前漢書律歷志後漢書陳寵傳備述于其後朱子於孟子集注主周月之說則既有定論而無疑矣然於易之本義兼存夏正周正之二者於詩之集傳猶用夏正而其門人於書之集傳亦然蓋以朱子之平生精力盡在四書於易於詩有未暇於更定而歸一於書則以屬之蔡氏而蔡氏未聞其師晚年之說故今因朱子之說更定而補之以次於春秋經傳之後列於傳記子史之前以尊經也若夫近代衆說之不齊則亦因朱子之說悉辨其疑以次于其最後而自叙其躁狂踰僭之不韙以終是編云又曰夏以建寅為春為正人紀也百王所同之善政周以建子為春為正天施也一王所用之權制故夫子欲用夏時而漢以後行之至今也是編也非敢重周時違聖言也誠不忍聖人作春秋以周臣子用周正朔本無疑而䝉後世之疑故釋其疑以尊聖經也凡虞夏之書用夏時七月之詩言公劉用夏時者皆不録以為證是編為考周之春王正月作也孟子七八月之間雨集溝澮皆盈說見七八月之間旱章此無注亦不録春秋隱公元年春王正月左氏傳曰王周正月杜預注周正建子正月子月也傳序又曰所用之歷即周正也胡氏傳曰周人以建子為正月則十一月是也張氏說見前隱公九年三月癸酉大雨震電庚辰大雨雪左氏傳書時失也公羊傳震電何以書記異也何異爾不時也大雨雪何以書記異也何異爾俶甚也何休注月令二月雷乃發聲榖梁傳八日之間再有大變隂陽錯行故謹而日之胡氏傳震電者陽精之發雨雪者隂氣之凝周三月夏之正月雷未可以出電未可以見而大震電陽失節也雷已出電已見則雪不當復降而大雨雪此隂氣縱也鍾巫之難萌矣漢書五行志劉向以為三月今正月也當雨水雪雜雨雷電未可以發也既已發也則雪不當復降皆失節故謂之異以公子翬之禍當之愚按三傳皆以為不時為變異也漢劉向之說明白故胡氏從之此周正也桓公四年春正月公狩于郎左氏傳書時禮也杜注冬獵曰狩周之春夏之冬也田狩皆夏時也公羊傳冬曰狩常事不書此何以書譏逺也胡氏從公羊傳愚按周春正月夏冬十一月也冬曰狩不以不時書以譏逺書也六年秋八月壬午大閲胡氏傳曰周禮中冬教大閲書八月不時愚按周八月夏六月也故曰不時八年春正月己卯蒸左氏傳曰閉蟄而蒸注閉蟄建亥之月此夏之仲月非為過而書為下五月復蒸見瀆也胡氏曰非以不時為再蒸見瀆書也愚按周正月夏十一月也故不以不時書趙匡曰四時之祭皆夏時夏五月丁丑蒸榖梁曰蒸冬祭也春夏興之黷祀也志不敬也愚按周五月夏三月也傳夏字衍文也榖梁皆夏時此誤也八年冬十月雨雪公羊曰記異也注今八月未當雨雪此隂氣太盛兵象也愚按漢書五行志劉向曰周冬夏秋周十月今八月也十四年春正月無冰公羊曰記異也注周正月夏十一月法當堅冰無冰溫也此夫人淫泆隂而陽行之所致榖梁曰時燠也胡氏曰今仲冬之月燠而無冰則政治縱弛不明之所致也愚按漢五行志劉向以為周春夏冬也秋八月御廪災乙亥嘗公羊曰譏嘗也注當廢一時祭以奉天災也周八月非孟秋本不時不以不時書者本不當嘗也胡氏曰春秋用周月以八月嘗不時也愚按周八月夏六月也故曰不時周正也莊公七年秋大水無麥苖左氏曰不害嘉榖也注今五月周之秋平地水出漂殺熟麥及五稼苗黍稷尚可更種故曰不害愚按周七月也周季秋夏孟秋也孟秋凉風至白露降見月令少隂用事殺氣至也律為夷則隂氣夷傷物也見律歷志是月登榖而五種皆不殖矣左氏謂不害嘉榖杜注謂黍稷尚可更種皆非也緣麥苗之並書杜氏遂以為五月水出漂殺熟麥也考於二十八年書冬大無麥禾則於義不通矣蓋麥為五榖之一續食之最重者故書麥苗麥禾以該五榖也書無麥苗於秋見五稼之皆無志大水為災也書大無麥禾於冬見五榖之大無志倉廪俱竭也則秋為周七月明矣十七年冬多麋左氏注䴢多則害五稼故以災書愚按周之冬夏之秋也故麋多則稼害十八年秋有􅈮愚按漢五行志以為􅈮盛暑所生非自越來盛暑夏六月周八月也六月而生七月見異而書二十八年冬大無麥禾公羊傳注書於冬五榖畢入計食不足然後書愚按冬周十月也豳風十月納禾稼故傳曰五榖畢入計食不足僖公十年冬大雨雪雪公羊作雹公羊曰記異也愚按周十月也孟冬水始冰地始凍書大雨雪寒甚過度也三十三年十有二月隕霜不殺草李梅實左氏傳注書時失也周十二月今十月霜當微而重重而不能殺所以為災公羊傳何以書記異也何異爾不時也注周之十二月夏十月也愚按漢書五行志劉向曰周十二月今十月君誅不行舒緩之應襄公二十八年春無冰左氏傳注前年再失閏故置兩閏以應天正故言此年正月建子以無氷為災而書愚按周之春夏之冬也杜氏明以建子為春矣不書正月疑脫文也定公元年冬十月隕霜殺菽公羊傳曰記異也注周十月夏八月微霜用事未可殺也愚按此周正也殺菽舉重也未可殺而殺故以為異也漢五行志劉向以為周十月今八月也哀公十二年冬十有二月螽左氏傳注是嵗失不置閏十二月即今九月九月初尚溫故有螽仲尼曰火伏而後蟄者畢今火猶西流司歷過也愚按漢五行志劉歆曰周十二月夏十月也火星既伏蟄蟲皆畢天之見異也成十六年春王正月雨木冰左氏疏曰正月今之仲冬時猶有雨未是盛寒雨下著樹為冰記寒甚過節度榖梁傳曰志異也注木介甲胄兵之象此說為是左氏疏非也故不引為證附著於後又按春秋無事必書首時首月以周正月為春則周之夏四月夏之春二月夏者假大而物盛也周之秋七月夏之夏五月秋者一隂生而揫斂也周之冬十月夏之秋八月冬者藏而嵗終也義見漢書律歷志固亦可通而終未盡善故夫子欲行夏之時也亦附著于後云左氏傳隱公三年四月鄭祭足帥師取溫之麥秋又取成周之禾注溫周邑周之四月今之二月也麥尚未熟言取溫之麥蓋帥師芟蹂之也秋今之五六七月也禾亦未熟復帥師芟蹂成周洛陽之禾僖公五年春王正月辛亥朔日南至注周正月今之十一月蓋十一月之一日冬至也愚按周之春夏之冬也至日在周正月書日南至不書冬至周十一月非冬也僖公五年晉侯圍上陽卜偃曰克之童謡云丙之晨龍尾伏辰尾星也均服振振取虢之旗鶉之賁賁鶉火星天策焞焞傅說星火中成軍虢公其奔其九月十月之交乎十月朔丙子旦注周十二月一日日在丙子旦朔旦也日在尾月在䇿鶉火中必此時也冬十二月丙子朔注以星驗推之乃夏之九月十月晦朔交㑹之時夏之十月周十二月也晉師滅虢虢公醜奔周愚按漢書五行志以為周十二月夏十月也言天者以夏正詳見後辨僖公十五年秦伯伐晉卜徒父筮之曰歲云秋矣注周九月夏之七月孟秋也我落其實而取其材注艮為山在外象晉巽為風在內象秦占時屬秋風吹落山木之實秦為主故曰我落其實愚按周九月夏七月周正也襄公三十年三月癸未悼夫人食輿人之城杞者綘縣人與於食曰臣生之歲正月甲子朔四百四十五甲子矣注所稱正月得夏一月甲子也其季於今注其末至今日三之一也自甲子甲戌至癸未凡二十日故為三分六甲之一也師曠曰七十三年矣士文伯曰二萬六千六百有六旬也注此說四百四十五甲子其季於今三之一也之日始四百四十五甲子合得二萬六千七百日以其未三分六甲之一故少四十日實得二萬六千六百六十日也愚按絳人所歷七十三年二萬六千六百六旬之數正當是年夏正正月之癸未今傳書在三月則周之三月夏之正月也詳見後辨昭四年春王正月大雨雹申豐曰古者日在北陸而藏冰注謂夏十一月日在虛危西陸朝覿而出之注謂奎婁昴畢乃西方之星春分之中奎星朝見東方夏三月周五月日在昴畢出冰而用之愚按夏三月周五月周正也十七年夏六月甲戌朔日有食之祝史請所用幣平子禦之唯正月朔於是乎有伐鼓用幣太史曰在此月也注正月謂建巳正陽之月也於周為六月於夏為四月平子以為六月非正月故太史答言在此月也日過分而未至日過春分而未夏至當夏四月是謂孟夏注言此六月當夏家之四月是謂孟夏之月愚按亦周正也昭十七年冬有星孛于大辰傳曰西及漢梓慎曰火出於夏為三月注建辰月於商為四月注亦建辰月於周為五月注亦建辰月夏數得天若火作其四月五月之交其宋衛陳鄭乎案後漢注夏之八月辰星見在天漢而今孛星出辰西光芒東及天漢故曰今除於火注今彗出所除於大火大辰之星愚按傳稱八月而經書冬周之冬夏之秋周之十月夏之八月也而梓慎之言改月明矣十八年夏五月壬午宋衛陳鄭災傳曰夏五月火始昏見注大火心星建辰之月始昏見丙子風云云戊寅風甚壬午火甚愚按大火昏見夏之三月也今經書五月周五月夏三月也周正也昭二十四年夏五月乙未朔日有食之梓慎曰將水注謂隂勝陽故曰將水昭子曰旱也日過分注五月建辰故曰已過春分之節而陽猶不克克必甚注陽氣盛時猶不勝隂陽氣久鬱及其勝隂必將猥出能無旱乎陽不克莫注莫然不動將積聚也必將積聚而為災愚按亦周正也昭三十一年十有二月辛亥朔日有食之史墨曰吳其入郢乎日月在辰尾注辰尾龍尾也周十二月今之十月日月合朔於辰尾而食愚按亦周正也桓公五年秋大雩左氏傳曰書不時也凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而蒸愚按春秋凡書秋者周九月夏七月也七月雩不時大雩於上帝用盛樂又僭禮故書無庸言也然其言啓蟄而郊何也蓋左氏所言者郊以祈農事雩以祈雨澤嘗蒸以秋冬報皆農事也而孟春以祈穀于上帝故亦謂之郊考於禮記一嵗有數郊惟冬至禮天神于圜丘乃正為天子之郊禮記明言成王賜魯公祀周公以天子之禮是以魯君孟春乘大輅載弧韣旗十有二旒日月之章祀帝于郊配以后稷天子之禮也則是冬至圜丘之郊也况春秋書魯郊繼以猶三望三望者祀山川也則是魯郊非祈榖之郊明矣襄公九年春宋災左氏傳士弱曰古之火正或食於心或食於咮以出內火咮為鶉火南方栁星也心為大火東方蒼龍星也陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火商人閲其禍敗之釁必始於火愚按春秋凡書春周三月夏正月也左傳曰龍見而雩謂夏九月蒼龍角亢之星晨見東方火見而致用謂心星次角亢而晨見也月令曰季冬之月旦氐中氐亦大火之次故昭三年晉張躍曰火中而寒暑退杜氏注曰心星以季冬旦中而寒退宋商後也其禍敗之釁必始於火士弱特言其理如此耳初未嘗言此為火出建辰之月也夫大火有春冬晨見旦見之不同此乃大火旦見於去年夏之十二月既一月而災應之也以天道言之則昭十年三月鄭鑄刑書晉士文伯曰火見鄭其災乎六月而鄭果災既三月而後應也昭十七年冬有星孛于大辰火之次至十八年夏五月宋衛陳鄭災既七月而災始應天道逺也以人事言之則宋樂喜為火備如徹小屋塗大屋備水器表火道具正徒納郊保庀官司庀刑器出車馬庀武守警宫敬享用馬于四墉祀盤庚于西門外之類非一朝夕倉卒可為也則此春為周之十二月夏之正月明矣昭公九年夏四月陳災左氏傳禆竈曰陳水之屬也火水妃也今火出而火陳五年陳將復封愚按周四月夏二月也禆竈言火出而火陳者乃大火旦見於去年夏十二月至是更二月而災應也經傳言火出而災者四鄭災者火出建辰之月宋陳災者火見於建丑之月宋衛陳鄭災者冬孛于大火之次非專言火出建辰之月也總論曰秋大雩之傳曰啓蟄而郊宋災陳災之傳不言火見於某月恐有疑其為夏正者故詳說而附著于後周易臨卦彖曰至于八月有凶孔頴達正義曰八月有凶者以物盛必衰隂長陽退臨為建丑之月從建丑至八月建申之時三隂既盛三陽方退小人道長君子道消故八月有凶也愚按本義之說以八月為自復卦一陽之月至遁卦二隂之月隂長陽遁之時又謂此為建酉之八月為觀亦臨之反對兩存其說而不決前說從何氏周正也後說從褚氏夏正也復之彖曰七日來復是自夏正五月一隂長數至夏正十一月一陽來復日屬陽故陽稱七日扶之欲其亟長也於七月詩一之日二之日三之日四之日即此義也今臨之彖曰八月有凶是自夏正十二月二陽長數至夏正七月三隂長月屬隂故隂稱八月抑之欲其難長也蓋復彖自復數起為七日矣則臨卦當自臨數起不當又自復數起當自夏十二月數起不當自夏十一月數起若自臨卦夏十二月數起則自臨至遁為夏之六月僅得七月不可言八月有凶若自臨卦夏十二月數起則自臨至觀為夏正之八月又九閲月尤不可言八月有凶今自夏十二月數起至夏正之建申七月恰是八月於時為商正之八月也於卦為否三隂長而陽消故其彖曰否之匪人不利君子貞天地不交萬物不通其凶甚矣非若遁猶有厲而觀絶無凶也而况否之彖曰小人道長君子道消而臨於八月有凶之傳曰消不久也正指否卦而言至為明白今若以為遁是文王而用周正也以為觀是文王而用夏正也文王作爻辭時為商西伯為商之臣用商之正復何疑乎若為商之臣而用周正是僣號稱王而改商正朔大不可也為商之臣而用夏正是不奉時王正朔而用異代正朔亦不可也孔氏從漢諸儒之說是矣近時儒者隆山李氏舜臣亦有謂文王演易時猶為西伯安有未代商已用周正此固不攻而自破是矣而又謂臨於月為丑乃商人之正文王逆知盛衰消長之數寄之於易謂今雖盛大臨人之勢後且有終凶必然之理為萬世戒其意微矣則愚恐聖人正大寬厚之心不如是也且宋代諸儒極辨文王未嘗稱王而猶為此論故愚極辨文王奉殷正朔以服事殷之為至德者焉兊卦曰兊正秋也萬物之所說也愚按邵子曰此卦位乃文王所定後天之學也曰兊正秋夏時也夏時百王所同著之於十翼言其理也不曰兊正秋而曰兊孟冬於理不可也若周之時則一王之所用魯史奉周正朔而書之以紀其事也以為改從夏時是改周之正朔矣二者固不同也臨之彖乃文王脫羑里為西伯之時其時位與夫子亦不同也詩唐風蟋蟀篇蟋蟀在堂歲聿其莫毛傳曰蟋蟀蛬也九月在堂聿遂也孔疏正義曰戶內户外總名為堂七月篇言蟋蟀九月在戶此言在堂謂在室户之外與户相近是九月可知時當九月嵗未為暮者言其過此月後則歲遂將暮耳謂十月以後為歲暮也小明云歲聿云暮采蕭穫菽采穫是九月之事也云嵗聿云暮其意與此同歲實未暮而云聿暮故知聿為遂者從始嚮末之言也愚按周以十一月為歲首故此言十月以後為歲暮九月為歲聿其暮周正也采薇篇采薇采薇薇亦作止曰歸曰歸歲亦莫止晚也采薇采薇薇亦剛止曰歸曰歸嵗亦陽止注十月坤月嫌於無陽故名此月為陽月昔我往矣楊栁依依今我來思雨雪霏霏愚按此詩曰雨雪霏霏曰歲亦陽止則周十二月夏之十月也故其首章曰歲亦莫止周以夏十一月為正月為嵗首也六月篇六月棲棲戎車既飭維此六月既成我服愚按周六月夏四月也盛暑非玁狁入冦時也十月之交篇十月之交朔日辛卯日有食之亦孔之醜鄭箋曰周之十月夏之八月也八月朔日日月交㑹而日食為隂侵陽臣侵君之象日辰之義日為君辰為臣辛金也卯木也又以卯侵辛故甚惡也孔疏一食而有二象故為亦甚惡也愚按詩下文曰彼月而微此日而微又曰彼月而微則維其常此日而微于何不臧反覆言之以釋上文亦孔之醜謂彼月隂也宜有時而食此日純陽君象也不宜食而食此其所以為醜惡之甚也其義至明不必他為之說史記天官書亦曰月食常也日食為不臧詩下文曰􅏎􅏎震電蓋八月雷乃收聲之時而震電見焉亦為變異此詩亦周正也四月篇四月維夏六月徂暑秋日淒淒百卉具腓冬日烈烈飄風發發毛傳徂往也鄭箋曰徂猶始也愚按周之四月夏二月也春秋王正月朱子以為周改正月為春則此二月為夏矣周之六月夏四月也徂暑者言自此而往以至於盛暑也詩曰我徂惟求定曰我徂東山曰自我徂爾三歲食貧曰我征徂西書曰攸徂之民室家相慶皆自此往彼之辭今若以徂暑為暑往則豳風夏正之七月大火始西流而暑猶未退不可以為夏六月而暑已往也以為暑自此而往則夏六月為季夏非暑自此而往於盛也進退兩無所當故知此詩周月也朱子集傳曰淒淒涼風也卉草腓病也禮記月令曰孟秋凉風至天地始肅漢律歷志曰隂氣夷當傷之物夷則位於申在七月則秋日淒淒百卉具腓指夏正七月也孟子曰秋陽以暴之集注曰秋日燥烈也月令仲秋之月盲風至注盲風疾風也朱子集傳亦曰發發疾貌則冬日烈烈飄風發發指夏八月也然則此詩之秋冬亦周時也小明篇我征徂西至于艽野二月初吉載離寒暑云云昔我往矣日月方除曷云其還歲聿云莫念我獨兮我事孔庶云云昔我往矣日月方奧曷云其還政事愈蹙歲聿云莫采蕭穫菽鄭箋曰征行徂往也除除陳生新也載則也離歷冬寒夏暑愚按周二月夏十二月也首章言自我之徂西至于艽野之地其時十二月朔旦也今則既已離歷冬寒夏暑尚未得歸此心之所以憂而且苦也曰徂曰往者始發而往於彼也曰至者已往而至於彼也二義不同今以二月初吉書於至于艽野之下則二月為至彼之月也二章乃本其始往之月而言言其昔我之往也日月方除除者除舊布新之謂周以十一月為嵗首而除舊布新也我之始往自謂其時即歸何言其還乃至歲將暮而尚未得歸故心憂而念我之獨也上言日月其除故下言嵗聿云莫首尾相應也三章亦本其始往之月而言言昔者我之往也日月方奧奧與厥民隩之義同言十一月氣寒而民聚居於室內室內西南隅為奧古字通用也我之始往亦自謂其時即歸何言其還乃至嵗將暮而尚未得歸采蕭穫菽以為卒嵗之用也上言田畢入居之事故下言助養農夫之具亦首尾相應也此兩章皆言歲聿云暮義見唐風蟋蟀篇孔疏謂十月以後為嵗暮而歲遂將暮為九月既引豳風七月又引此詩以證之是也今若以夏正二月為說則首章二月初吉當書於至于艽野之上文而不書其辭失序不得以為二月而始往也當言昔我往矣如下兩章而不言不得以二月初吉為下兩章方除方奧之月也仲春非嵗首亦不得以除舊布新為二月也自二月至九月則肅霜之月氣肅而肇寒不得以為離歷冬寒夏暑也以是觀之小明大夫以夏十一月始往徂西以十二月至于艽野至于明年之九月尚未得歸踰年之久能無憂乎此詩之㫖次序甚明與周正合然則二月初吉為夏十二月周二月信矣臣工篇嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鎛奄觀銍艾毛傳曰周之暮春於夏為孟春田二歲曰新三嵗曰畬愚按蔡氏書傳引此以為牟麥將熟其為季春可知今考之於全篇則其曰如何新畬命我衆人庤乃錢鎛即七月之詩曰一之日于耜二之日舉趾周官遂大夫正嵗簡稼器謂耒耜鎡基之屬修稼政謂修封疆相邱陵原隰皆孟春之事嗟嗟保介即月令孟春之月天子祈榖于上帝載耒耜措之于保介之御間帥三公九卿諸侯大夫躬耕帝籍之事也若待建辰之三月始治新畬始庤錢鎛不亦晚乎非夏之季春明矣若但以來牟將受厥明為三月則詩曰將受厥明不曰將熟夫麥種於今之八月長於三春月至四月而始登五月而盡刈周都關右地尤髙寒而將之云者見於經傳甚多皆未為而預言或未至而預期之辭詩人之言緩而不迫似難以一句蓋全篇而定其為夏之三月也朱子以此篇為戒農官之詩引月令吕覽皆為籍田而言竊因是說以為此詩乃孟春祈榖上帝躬耕籍田而戒農官也麥為五榖之中續食之最重者孟春之時三陽發動麥已生長是以祈榖之辭先言將受來牟之明賜繼之以迄用康年而終之以奄觀銍艾祈之明神欲五榖之皆熟故並言之猶春秋書麥禾於冬以該五榖之義也若以來牟將熟為春三月則冬十月非麥熟之時不得言無麥矣蓋春秋並書麥禾於終而著五榖之大無此詩並言來牟銍艾於始而期五榖之大有然則將受厥明乃期之之辭非即時賦物之比不可以文害辭也而此詩為周季春夏之孟春也明矣書甘誓怠棄三正蔡氏曰子丑寅之三正也怠棄者不用夏之正朔此見三正迭建其來久矣子丑之正唐虞之前當已有之愚按蔡氏之說是也既改正矣而又曰不改月數何也伊訓惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冢宰序曰成湯既沒太甲元年漢孔氏傳曰此湯崩踰月太甲即位奠殯而告奉嗣王祗見厥祖居位主喪侯甸羣后咸在位次唐孔氏正義曰殷家猶質踰月即改元年以明世異不待正月以為首也周法以踰年即位商謂年為祀伊尹祠于先王祭湯也奉嗣王祗見厥祖見湯也愚按蔡氏集傳曰元祀者太甲即位之元年以元年為踰年即位改元之元年辨見踰年即位改元十二月者商以建丑為正故以十二月為正以商為不改月數此十二月即夏之十二月也辨見改正朔不改月數下考之於書虞夏受禪曰正月上日受終于文祖曰正月朔旦受命于神宗至於商周革命皆改正朔以歲首之一月為正月者人君重居正也月必書正猶年之必書元也春秋於定公元年不書正定無正也商既以十二月為正今但書十二月而不書正則是商無正矣不可也漢書律歷志曰成湯即世崩沒之時商十二月乙丑朔旦冬至故書序曰成湯既沒太甲元年使伊尹作伊訓伊訓篇曰惟太甲元年十有二月乙丑伊尹祠于先王誕咨有牧方明是朔旦冬至之義也蓋漢初古歷猶存此其全文也故孔氏從之非臆說也蔡氏又曰三代雖正朔不同然皆以寅月起數蓋朝覲㑹同班歷授時則以正朔行事至於紀月之數則皆以寅為首謂改正朔不改月數也今考之春秋胡氏傳所引周書曰夏正得天百王所同其在商周革命改正示不相㳂襲至於敬授人時巡守蒸享猶自夏焉自夏者仍以夏時也今謂朝覲㑹同班歷授時三代皆以正朔行事與周書不合矣今若果如其說以之班歷授時則虞周之時冬行春令四時失序信不可也蓋蔡氏未及考於周官之有正月正歲亦未及聞朱子晚年之定論故亦疑於冬不可為春而為是說也律歷志又曰太甲雖有成湯太丁外丙之服以冬至越茀祀先王于方明以配上帝是朔旦冬至之義也與書序同故孔氏從之亦非臆說也然孟子之言太丁未立外丙二年仲壬四年既與漢書略有不同而趙氏程子兩說亦異固莫知其孰是但古者重於君臣之禮不以叔姪弟昆逆其祀故有祖廟有考廟今言祗見厥祖則是湯為之祖矣有祖則必有考為人後者為之子也雖衆說有略不同而太甲有所繼之父之服則同也雖有所繼之父之服而重在於湯故既祀于先王而又見于湯也古人之言簡質但言祗見厥祖則有父之服可知漢書言成湯崩沒之時書序言成湯既沒皆是槩指前後之事而言古文則然也蔡氏又引詩四月維夏六月徂暑為寅月起數之證愚己辨於引詩之四月矣又引史記書秦元年冬十月以為證則子丑寅三陽之月三代皆以為春則可若建亥六隂之月無陽氣蠢動之義信不可以為春秦廢先王之正自為一代之制史氏書秦之制亦自為一代之文不得引以為例也蔡氏又引惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳以謂祠告復政皆重事故皆正朔行事以為證則祠告之說康王之誥固有受册即位之明文詳見後辨踰年即位改元而復政之說則伊尹因太甲有三年之喪乃營桐宫使之居憂於此密邇成湯之墓以絶其昵比之私興起其自怨自艾之心而歸於善也及其克終厥德則因其終喪之月以冕服奉迎以歸非前廢主而今復辟也且愚固嘗合二篇之年月日而考之自崩年即位之元祀十有二月至于終喪歸亳三祀之十有二月正在禮所謂三年之喪二十五月而畢之月也若以為踰年而即位改元也則方其即位改元之月既已踰年矣而又加以自元祀至三祀之二十五月則為四年而非三祀矣夫孟子明言三年復歸于亳太甲中篇亦明言三祀非四年也而况營桐之舉乃人臣之大變不得已之事伊尹之心固幸其君之終喪而亟迎以歸也今乃既踰終喪猶未復政而因循以至于四年以伊尹之聖决不為是萬萬無疑也由是而言伊訓之元祀非踰年即位改元之元年又無疑也且愚又嘗考於惟三祀十有二月朔之文矣夫自元祀之十有二月至于三祀十有二月之朔旦以畢喪之月數計之其時為二十有四月之方畢猶有一月之虧也伊尹之聖决不以一月之有虧而亂喪紀之常亦無疑也竊意太甲即位之月與康王即位之月同則自元祀十有二月以至三祀十有二月之朔旦恰為二十有五月而無虧踰月即位之云恐亦未得為至當之論也噫孔傳與序朱子固嘗疑之矣蔡氏又非孔傳引蘇氏之說以崩年改元為亂世事則康王之誥自乙丑至癸酉方及九日明為崩年即位固與此篇同矣詳見辨踰年即位改元但古人之禮與後之亂世即位於柩前者事雖同而心則異也以是觀之則十有二月為商之十二月夏之十一月也信矣泰誓上惟十有三年春大㑹于孟津孔氏正義曰周之孟春建子之月也按三統歷以殷之十二月武王發師至二月甲子咸劉商王紂彼十二月即周之正月建子之月也愚按孔氏之說是也漢唐諸儒無異論也蔡氏以為孟春建寅之月引鄭氏以詩維莫之春為夏之孟春乃承襲漢儒之誤說見前引詩臣工篇又以為四時改易皆不得其正正愚所謂未及聞朱子晚年之定論也周有正月正嵗安有四時改易之不得其正者乎泰誓中惟戊午王次于河朔序曰一月戊午師度孟津愚按蔡氏謂孔氏因一月戊午遂以泰誓篇十一月為春非是今以漢書律歷志考之則孔氏為有据律歷志文見下武成牧誓甲子昧爽王朝至于商郊牧野孔氏正義曰周之二月四日武成篇從更定文惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野孔氏正義曰周正月辛卯朔二日壬辰伐紂三日癸巳發鎬京二十八日戊午渡河泰誓序云一月戊午師渡孟津中篇云惟戊午王次于河朔是也二月辛酉朔甲子殺紂牧誓云甲子昧爽乃誓是也愚按漢書律歷志引武成篇云惟一月壬辰旁死魄若翼日癸已武王乃朝步自周于征伐紂越若來二月既死魄越五日甲子咸劉商王紂引傳曰周師初發以殷十一月戊子亥月後三日得周正辛卯朔子月明日壬辰又明日癸巳始發戊午渡于孟津孟津去周九百里師行三十里故三十一日而渡戊子至戊午明日已未冬至正月二十九日庚申二月朔丑月四日癸亥至牧野夜陳甲子昧爽而合矣此與今泰誓武成日月時皆合但其文與今之古文武成不同孔頴達謂漢書所引為僞書其後又亡其篇漢世謂之逸書引鄭𤣥云武成逸書建武之際亡矣又按周語云王以二月癸亥夜陳未畢而雨與漢書同託於孔壁後出之書乃疑其僞姑未暇辨但二篇皆以一月壬辰為周之正月周之正月是建子之月商十二月也蓋武王初伐商猶未革命未改正朔故但書一月序亦言一月戊午與洪範惟十有三祀同義蓋以武王初克商即下車訪箕子其時猶未改正朔故稱年曰祀也武王克商之初猶未遽改正朔可見文王未嘗稱王矣金縢秋大熟未穫天大雷電以風禾則盡偃云云歲則大熟孔傳曰二年秋也愚按豳風夏正云八月其穫則此云秋者周正七月也八月雷收聲雷電以風為七月也後言嵗則大熟指十月也何以知其為十月豳風七月之詩曰十月納禾稼黍稷重穋禾麻菽麥朱子集傳以為自田而納於場者無所不備則禾稼總五榖而言也五榖皆熟為有年故書之曰歲則大熟猶春秋並書麥禾也麥禾該五榖而言也五榖咸不熟為饑歲故書之曰冬大無麥禾蓋周以十一月為嵗首十月為歲終㑹計歲事皆於十月以是知其為十月也此篇書秋不書月以七月於夏周皆秋無俟乎書月春秋書冬不書月以十月於夏商皆冬亦無俟乎書月也然則此篇之秋大熟亦周時也召誥惟二月既望越六日乙未王朝步自周則至于豐惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成若翼日乙卯云云越三日丁巳云云越七日甲子云云孔氏正義曰左傳發例云凡土功水昏至而栽日至而畢此以周之三月農時役衆者遷都事大不可拘以常制也愚按此言周之三月為農時是夏之正月也則二月既望為夏之十二月也與小明詩二月初吉同也二月不繫之時者二月於周非春也洛誥曰惟三月哉生魄周公初基作新大邑于東國洛舊脫簡在康誥先儒定為洛誥文今從之豫惟乙卯朝至于洛師戊辰王在新邑蒸祭嵗文王騂牛一武王騂牛一王命周公後作册逸誥在十有二月孔氏傳曰成王既受周公誥遂就居洛邑以十二月戊辰晦到明月夏之仲冬始於新邑蒸祭故曰蒸祭歲孔氏正義曰成王東赴洛邑其年十二月晦戊辰日在新邑後月是夏之仲冬為冬節蒸祭其月是周之嵗首特異常祭加文王武王騂牛各一也此嵗入戊午蔀五十六年三月云丙午朏以算法計之三月甲辰朔大四月甲戌朔小五月癸卯朔大六月癸酉朔小七月壬寅朔大八月壬申朔小九月辛丑朔大又有閏九月辛未朔小十月庚子朔大十一月庚午朔小十二月己亥朔大計十二月三十日戊辰晦到洛也下云在十有二月者周十二月建亥之月也戊辰是其晦日故明日即是夏之仲冬建子之月也言明月者此蒸祭非朔日故言月也自作新邑以來未嘗於此祭祀此嵗始於新邑蒸祭故曰蒸祭歲也愚按律歷志是歲十二月戊辰晦周公以反政故洛誥篇曰戊辰王在新邑蒸祭嵗命作冊惟周公誕保文武受命惟七年周十二月夏十月也周以十一月改正月為歲首故曰蒸祭歲孔說是也冬祭曰蒸此月蒸祭者趙匡曰四時之祭皆夏時也篇首惟三月夏之正月也不繫之時多士篇惟三月周公初于新邑洛多方篇惟五月丁亥王來自奄至于宗周愚按二篇皆周月也多方五月不繫之夏者五月於周非夏也顧命惟四月哉生魄王不懌甲子云云越翼日乙丑云云丁卯命作冊度越七日癸酉云云孔氏傳曰成王崩年之四月始生魄月十六日愚按漢律歷志成王三十年四月庚戌朔十五日甲子哉生霸引顧命云云與書同四月夏二月也不繫之時總論六篇之義金縢書時不言月召誥洛誥多士多方顧命書月日不書時蓋周以子月為正於夏正有兩月之不同夏正自前代行於民間已久而正月正歲又自有參差之不齊故於時月日之書皆不相繫以一臣民之耳目視聽使之不惑此周一代書法也厥後魯公費誓甲戌我惟征徐戎甲戌我惟築猶周之書法見魯用周正朔也畢命惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊愚按漢律歷志曰康王十二年六月戊辰朔三日庚午故畢命豐刑曰惟十有二年六月戊辰朔三日庚午朏王命作䇿豐刑孟康注曰逸書篇名漢儒未曽見今畢命也今畢命篇首年月日皆備與周史官書法見於伏生口受者異非特文章體製氣象之不同此所以為孔壁後出之書也論語曾㸃言志曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸愚按此章程子朱子發明曽㸃已見大意之㫖論語第一義孰敢少置其疑矣近觀平庵項氏安世家說引漢志漢初祈榖之祭舞以七十二人冠者五六人五六三十也童子六七人六七四十二人也魯沂上有溫泉故曰浴乎沂有舞雩臺故曰風乎舞雩也祭而歌舞有詠歎淫泆之辭故曰詠而歸也上已祓禊起秦昭王周時未有也蓋夫子問諸弟子以如有用我則將何以用世故諸弟子皆言其用世之事㸃以此對欲以農事為國故指孟春祈榖之事言之亦用世之事也夫子言三年有成亦指農事言之猶孟子勸齊梁之君行王道而先農桑也其說雖出於漢初之鄙俚而去周未逺似亦有據項氏朱子同時人說諸經皆平正而非為新竒之論者姑録之以備周時之一說未敢以為必然也禮記明堂位篇魯君孟春乘大輅載弧韣旗十有二旒日月之章祀帝于郊配以后稷天子之禮也季夏六月以禘禮祀周公于太廟牲用白牡鄭注孟春建子之月魯之始郊日以至季夏建巳之月白牡殷牲也愚按魯郊用周禮禘用商禮先儒曰正用時王之禮者諸侯之事通用先王之禮者天子之事魯僣也建子十一月謂之孟春建巳四月謂之季夏六月則春秋建子之為春明矣詩二月之為四月維夏亦明矣後篇正月日至尤其明證雜記篇孟獻子曰正月日至可以有事于上帝七月日至可以有事於祖七月而禘獻子為之也鄭注周正月建子之月也日至冬至日也七月周七月建午之月日至夏至日也獻子言建子冬至既祭上帝則建午夏至亦可禘祖非也魯之祭祀宗廟亦猶用夏家之法凡大祭宜用首時應禘於孟月孟月於夏是四月於周為六月獻子捨此義欲以兩至相對以天對祖乖夫禮意矣愚按建子之月冬至而曰正月日至不曰冬至以周十一月不為冬也建午之月夏至而曰七月日至不曰夏至以周五月不為夏也然則春秋建子之月不以為冬而以為春亦明矣郊特牲天子大蠟八伊耆氏始為蠟蠟也者索也歲十二月合聚萬物而索饗之也注蠟祭八神先穡一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八鄭注嵗十二月周之正數謂建亥之月也孔正義曰知是周十二月者下云既蠟而收民息已收謂收斂則詩所謂十月納禾稼月令云孟冬祈來年于天宗是知蠟周建亥之月三代皆然此經文據周故為十二月愚按漢蔡雍曰夏曰嘉平商曰清祀周曰大蠟秦曰臘送而不迎皆嵗終之祭也夫三代及秦正朔不同則其為嵗終各異故月令於孟冬十月曰臘先祖五祀勞農以休息之則秦建亥為歲首之月也既與嵗終之說不同而秦以十月為臘遂改臘月為嘉平今曰夏曰嘉平則又誤矣其說亦難盡信也鄭氏三代皆蠟以亥月之說愚亦未敢盡信也周禮大司徒正歲令于教官曰各共爾職修八事以聽王命鄭注正歲夏正月朔日愚按正嵗朱子所謂周禮有正歲正月則周實是元改作春正月是已而春秋胡氏傳引周書猶自夏焉者亦此意也凌人掌冰正歲十有二月令斬冰三其凌春始治鑑夏頒冰秋刷鄭注正歲季冬火星中大寒冰方盛之時凌冰室也三之者為消釋度也杜子春讀掌冰為主冰正為夏正三其凌三倍其冰愚按周書謂授時巡守蒸享猶自夏焉杜氏亦謂田狩皆用夏時則藏冰之用在於賔食喪祭亦皆用夏時也故此以夏正十二月言之下文亦然然與豳風左傳亦不同矣詳見後異說辨遂大夫正歲簡稼器修稼政注簡猶閲也稼器耒耜鎡基之屬稼政孟春之月令所云修封疆審端徑術善相邱陵阪險原隰土地所冝五榖所殖以教道民必躬親也太史正歲年以序事頒之于官府及都鄙頒告朔于邦國注中數月歲朔數曰年中朔大小不齊正之以閏若今作歷也訓方氏掌通四方之政事與其上下之志誦四方之傳道正歲則布而訓四方而觀新物注四時於新物出則觀之以知民志所好惡志淫行辟則以政教化正之視祲掌十輝之法以觀妖祥辨吉凶正歲則行事注占夢以季冬贈惡夢比正月而行安宅之事以順民嵗終則弊其事弊斷也謂比其吉凶然否多少小司寇歲終則令羣士計獄弊訟登中于天府正歲率其屬而觀刑象令以木鐸曰不用法者國有常刑士師嵗終則令正要㑹定比簿正嵗帥其屬而憲禁令于國及郊野愚按凌人正嵗十有二月夏季冬也遂大夫訓方氏正歲夏正月也大司徒小司寇士師先嵗終而後正歲視祲先正嵗而後嵗終考之皆夏正月也所謂自夏所謂正嵗用夏時也天官太宰正月之吉始和而治于邦國都鄙注正月周之正月凡治有故言始和者若改造云爾地官大司徒正月之吉始和布教於邦國都鄙注正月之吉正月朔日也夏官大司馬正月之吉始和布政於邦國都鄙注正月朔日秋官大司寇正月之吉始和布刑於邦國都鄙注正月朔日愚按鄭注云正月謂周之正月則夏十一月也正嵗則夏之正月也所謂自夏用夏時也史記歷書昔自在古歷建正作於孟春云云王者易姓受命必慎始初改正朔易服色索隱曰案古歷者謂黃帝調歷以前有上元太初歷等皆以建寅為正謂之孟春顓頊夏禹亦以建寅為正惟黃帝及殷周魯並建子為正而秦正建亥漢初因之至武帝元封七年始改用太初歷仍以周正建子為十一月朔旦冬至改元太初歷焉今按此文至於十二月節出大戴禮虞史伯夷之辭也愚按此則黃帝以前已有三正與夏書甘誓合非始於三代也又按建寅為正謂之孟春則在天之月止有建子建丑建寅至於建戌與亥而春夏秋冬孟仲季之名出於人之所命隨時而改以為一代之正朔者也商正建丑而此云並建子者猶易繫曰潤之以風雨風不得為潤也伯夷虞史也古人簡質言多類此非誤也夏正以正月殷正以十二月周正以十一月蓋三王之政若循環愚按三代改正子丑寅迭為正月伊訓書十二月不書正非夏正十二月也商周既改正矣而此云十二月十一月者漢武用夏正司馬遷漢時人言今夏時見二者為商周之時後世之辭也十一月朔更以七年為太初元年年名閼逢攝提格月名畢聚得夜半朔旦冬至愚按三正始於天施而治天下立人極必當用人紀故夫子言行夏之時自漢迄今用之而不能改人事之當然也然作歷必用天正以甲子夜半朔旦冬至為元又自黃帝命大撓造甲子以來數干支必首甲子以子月為明年久矣而以子半為明日者不能改天數之本然也至於日出而作日入而息亦猶周之授時用夏時也漢書律歷志三統者天施地化人事之紀也十一月乾之初九陽氣伏於地下始著為一萬物萌動故黃鐘為天統正月乾之九三萬物棣通棣音替族出於寅人奉而行之令事物各得其理故太簇為人統其於三正也黃鐘子為天正師古曰正音之成反林鐘未之衝丑為地正太簇寅為人正愚按在律歷為三統在正朔為三正太隂者北方北伏也陽氣伏於下於時為冬冬終也物終藏乃可稱太陽者南方南任也陽氣任養物於時為夏夏假也物假大乃宣平少隂者西方西遷也隂氣遷落物於時為秋秋􅒫也即揫也物揫斂乃成熟少陽者東方東動也於時為春春蠢也物蠢生乃動運愚按四時之名皆人所命春蠢也言陽氣蠢動也子一陽之月丑二陽之月寅三陽之月故夏商周皆以為春亥六隂之月不可為春矣故行之不久也夫歷春秋者天時也列人事而目以天時愚按此可證魯論行夏之時為在天之運四時之時帝王必改正朔易服色所以明受命於天也創業變改制不相復師古曰復重也因也今三代之統絶而不序矣愚按漢初尚因秦制以建亥為嵗首故云三代之統絶而不序見帝王必改正朔以為不改月者非也元典歷始曰元傳曰元善之長也共養三德為元孟康曰謂三統之微氣也當施育萬物故謂之德師古曰共讀曰供又曰元體之長也合三體而為之原故曰元於春三月每月書王元之三統也三統合於一元故因元一而九三之以為法孟康曰辰有十二其三為天地人之統老子曰三生萬物是以餘九辰得三氣乃能施化故每辰者以三統之數乘之是謂九三之法得積萬九千六百八十三十一三之以為實孟康曰以子數一乘丑三餘次辰亦每三乘之周十一辰得十七萬七千一百四十七實如法得一黃鐘愚按公羊傳何休注春秋二月三月皆書王者周二月殷之正月周三月夏之正月也與此同陳寵傳亦同子丑寅之三月皆書王而此曰春三月亦後世之辭也經曰春王正月傳曰周正月火出於夏為三月商為四月周為五月師古曰此左氏之辭夏數得天得四時之正也三代各據一統明三統常合而迭為首登降三統之首周還五行之道也故三五相包而生天統之正始施於子半日萌色赤地統受之於丑初日肇化而黃至丑半日牙化而白人統受之於寅初日孶成而黑至寅半日生成而青天施復於子地化自丑畢於辰如淳曰地以十二月生萬物三月乃畢人生自寅成於申如淳曰人功自正月至七月乃畢故歷數三統天以甲子李竒曰夏正月朔旦地以甲辰韋昭曰殷正月朔日人以甲申李竒曰周正月朔日孟仲季迭用事為統首愚按孟仲季迭用事為統首謂夏以建寅為孟春而建卯建辰為仲季商以建丑為孟春而建寅建卯為仲季周以建子為孟春而建丑建寅為仲季迭用事為統首則四時之孟仲季皆三代命之名特夏時為時之正令之善也三辰之合於三統也日合於天統月合於地統斗合於人統商十二月乙丑朔旦冬至詳見引書伊訓下愚按冬至在十二月則以為夏正十二月不可也蓋商正十二月也周師初發以殷十一月戊午詳見引書泰誓下武成篇曰文多不載詳見引書武成下召誥曰云詳見引云書召誥洛誥曰云詳見引云書洛誥顧命曰云詳見引云書顧命魯煬公二十四年正月丙申朔旦冬至魯微公二十六年正月乙亥朔旦冬至魯獻公十五年正月甲寅朔旦冬至魯懿公九年正月癸巳朔旦冬至魯惠公三十八年正月壬申朔旦冬至魯釐公五年正月辛亥朔旦冬至見引春秋左傳愚按漢初魯歷與黃帝顓頊夏商周之歷俱存劉歆用之為三統歷班固取之為律歷志所引冬至見於魯六公之時者皆在周正月非夏之正月左傳曰日至而此曰冬至者則亦後世之辭也後漢書陳寵傳寵奏曰夫冬至之節陽氣始萌故十一月有蘭射干藝荔之應易通卦驗曰十一月廣莫風至則蘭射干生月令仲冬日短至隂陽爭諸生蕩藝荔挺出射音夜即今之烏扇也藝香草荔鳥薤時令曰諸生蕩安形體時令月令也蕩動也仲冬一陽爻生草木皆欲動萌也禮記月令諸生蕩言當戒安形性也天以為正周以為春正春皆始也十一月萬物微而未著天以為正而周以為嵗首十二月陽氣雉雊雞乳地以為正殷以為春十二月二陽爻生鴈北向陽氣上通諸生皆動始萌芽地以為正殷以為歲首也月令季冬雉雊雞乳也十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春十三月今正月也三微成著以通三統統者統一嵗之事三者三正遞用周環無窮三禮義宗曰三微三正也言十一月陽氣始施萬物動於黃泉之下微而未著其色皆赤赤者陽氣故周以天正為嵗首色尚赤夜半為朔十二月萬物始牙色白白者隂氣故殷以地正為歲首色尚白雞鳴為朔十三月萬物始通其色皆黑人得加功以展其業故夏以人正為嵗首色尚黑平旦為朔故曰三微王者奉而成之各法其一以改正朔也秦為虐政四時行刑聖漢之興改從簡易蕭何草律季秋論囚俱避春之月而不計天地之正二王之春實頗有違言蕭何不論天地之正及殷周之春實乖正道陛下探幽析微允執其中革百載之失建承平之功上有迎承之敬下有奉微之惠三正之月不用斷獄敬承天意奉順三微也稽春秋之月當月令之意春秋於春每月書王所以通三統也何休注云二月三月皆有王者二月殷正月三月夏正月也聖功美業不亦宜乎帝納之春秋春王正月考
